<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/png" href="/logo-web.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (() => {
        const theme = localStorage.getItem("theme") || "system";
        const dark =
          theme === "dark" ||
          (theme === "system" &&
            matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = dark ? "dark" : "light";

        const favicon = document.querySelector('link[rel="icon"]');
        if (favicon) {
          favicon.href = dark ? "/logo-web-dark.png" : "/logo-web.png";
        }
      })();
    </script>
    <link rel="stylesheet" href="src/index.css" />
    <title>Restu Averian Putra — Frontend Engineer</title>

      content="Frontend Engineer portfolio featuring React projects, reusable UI systems, performance-focused engineering, and professional experience."
    />
